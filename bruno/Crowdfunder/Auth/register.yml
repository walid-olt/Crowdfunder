info:
  name: register
  type: http
  seq: 1

http:
  method: POST
  url: "{{baseUrl}}auth/register"
  body:
    type: json
    data: |
      {
        "name":"walid",
        "password":"password",
        "email":"walid@example.com",
        "role":"OWNER"
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
