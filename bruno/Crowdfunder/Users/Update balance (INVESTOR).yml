info:
  name: Update balance (INVESTOR)
  type: http
  seq: 3

http:
  method: POST
  url: "{{baseUrl}}users/{{exampleInvestorId}}/balance"
  body:
    type: json
    data: |
      {
        "operation": "add",
        "amount": 2500
      }
  auth:
    type: bearer
    token: "{{investorToken}}"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
